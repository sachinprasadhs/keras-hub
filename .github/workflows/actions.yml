name: Tests

on:
  push:
  pull_request:
  pull_request_review:
    types: [submitted]
  workflow_call:
  release:
    types: [created]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Test the code
    if: github.event_name != 'pull_request_review' || github.event.review.state == 'approved'
    strategy:
      fail-fast: false
      matrix:
        backend: [tensorflow, jax, torch]
        version: [keras-stable]
        include:
          - backend: jax
            version: keras-3.13
          - backend: jax
            version: keras-nightly
          - backend: openvino
            version: keras-nightly
    runs-on: ubuntu-latest
    env:
      KERAS_BACKEND: ${{ matrix.backend }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Get pip cache dir
      id: pip-cache
      run: |
        python -m pip install --upgrade pip setuptools
        echo "::set-output name=dir::$(pip cache dir)"
    - name: pip cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pip-cache.outputs.dir }}
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements-common.txt') }}-${{ hashFiles('requirements.txt') }}-${{ hashFiles('pyproject.toml') }}
    - name: Install dependencies
      run: |
          pip install -r requirements.txt --progress-bar off
          pip install --no-deps -e "." --progress-bar off
    - name: Pin Keras 3.13
      if: ${{ matrix.version == 'keras-3.13'}}
      run: |
        pip uninstall -y keras jaxlib jax
        pip install keras==3.13.0 --progress-bar off
        pip install jax==0.6.0 --progress-bar off
    - name: Pin Keras Nightly
      if: ${{ matrix.version == 'keras-nightly'}}
      run: |
        pip uninstall -y keras
        pip install keras-nightly --no-cache-dir --progress-bar off
    - name: Test with pytest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RUN_ALL_TESTS=false
        SKIP_TESTS=false
        
        if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "pull_request_review" ]]; then
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Processing PR #$PR_NUMBER"
          
          # Check if PR is approved or was approved
          IS_APPROVED=$(gh pr view $PR_NUMBER --json reviews --jq '.reviews[].state' | grep APPROVED || true)
          if [[ -n "$IS_APPROVED" ]]; then
            echo "PR is approved or was approved. Running all tests."
            RUN_ALL_TESTS=true
          fi
          
          # Fetch base branch to compare
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check for doc-only changes (e.g., only .md files)
          NON_DOC_CHANGES=$(echo "$CHANGED_FILES" | grep -v '\.md$' || true)
          if [[ -z "$NON_DOC_CHANGES" && -n "$CHANGED_FILES" ]]; then
            echo "Only doc fixes detected. Skipping tests."
            SKIP_TESTS=true
          fi
          
          # Find unique model directories
          CHANGED_MODELS=$(echo "$CHANGED_FILES" | grep 'keras_hub/src/models/' | cut -d/ -f1-4 | sort | uniq || true)
          echo "Changed models:"
          echo "$CHANGED_MODELS"
          
        elif [[ "${{ github.event_name }}" == "push" ]]; then
          echo "Push to branch. Running all tests."
          RUN_ALL_TESTS=true
        fi
        
        if [[ "$SKIP_TESTS" == "true" ]]; then
          echo "Skipping tests as requested for doc fixes."
        elif [[ "$RUN_ALL_TESTS" == "true" ]]; then
          echo "Running all tests..."
          pytest keras_hub/
        else
          # Check for non-model changes that require full tests
          # We ignore API files, tools, and converters as they are usually model-specific or registration
          NON_MODEL_CHANGES=$(echo "$CHANGED_FILES" | \
            grep -v 'keras_hub/src/models/' | \
            grep -v 'keras_hub/api/' | \
            grep -v 'tools/' | \
            grep -v 'convert_.*\.py$' | \
            grep -v '\.md$' || true)
            
          if [[ -n "$NON_MODEL_CHANGES" ]]; then
            echo "Non-model code files changed. Running all tests."
            pytest keras_hub/
          elif [[ -n "$CHANGED_MODELS" ]]; then
            echo "Running targeted tests for affected models..."
            for model_dir in $CHANGED_MODELS; do
              if [ -d "$model_dir" ]; then
                echo "Running tests in $model_dir"
                pytest $model_dir
              fi
            done
          else
            echo "No specific models identified or fallback triggered. Running all tests."
            pytest keras_hub/
          fi
        fi
    - name: Run integration tests
      run: |
        python pip_build.py --install
        cd integration_tests && pytest . -k "not NoTensorflow"
    - name: Run no tensorflow integration test
      if: ${{ matrix.backend != 'tensorflow'}}
      run: |
        pip uninstall -y tensorflow-text tensorflow
        cd integration_tests && pytest . -k "NoTensorflow"
  check_format:
    name: Check the code format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Get pip cache dir
        id: pip-cache
        run: |
          python -m pip install --upgrade pip setuptools
          echo "::set-output name=dir::$(pip cache dir)"
      - name: pip cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-common.txt') }}-${{ hashFiles('requirements.txt') }}-${{ hashFiles('pyproject.toml') }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt --progress-bar off
          pip install --no-deps -e "." --progress-bar off
      - name: Install pre-commit
        run: pip install pre-commit && pre-commit install
      - name: Run pre-commit
        run: pre-commit run --all-files --hook-stage manual
